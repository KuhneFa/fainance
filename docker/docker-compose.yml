services:

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ../fainance-backend
      dockerfile: ../docker/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - finance_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── Ollama ────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "sh", "-c", "cat < /dev/null > /dev/tcp/localhost/11434"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  finance_data:
  ollama_models: