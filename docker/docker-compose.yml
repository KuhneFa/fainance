services:

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ../fainance-backend
      dockerfile: ../docker/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - finance_data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  # ── Ollama ────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Kein Healthcheck — curl nicht im Ollama-Image verfügbar.
    # Das Backend prüft Ollama selbst beim Start via check_ollama_health()

volumes:
  finance_data:
  ollama_models: