version: "3.9"

services:

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ../docker/backend/Dockerfile
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Ollama läuft als eigener Service — kein localhost mehr
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      # finance.db persistent speichern — überlebt Container-Neustarts
      - finance_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── Ollama ────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      # Modelle persistent speichern — sonst wird bei jedem Start neu geladen
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  finance_data:
  ollama_models: