name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Lint ──────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff installieren
        run: pip install ruff

      - name: Auto-fix und prüfen
        working-directory: fainance-backend
        # --fix behebt alle auto-fixbaren Fehler (Imports, Newlines, f-strings)
        # Danach nochmal check — falls unfixbare Fehler übrig bleiben schlägt CI fehl
        run: |
          ruff check . --fix --unsafe-fixes
          ruff check .

  # ── Backend Unit Tests ────────────────────────────────────────────────────────
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: fainance-backend/requirements.txt

      - name: Dependencies installieren
        working-directory: fainance-backend
        run: pip install -r requirements.txt pytest httpx

      - name: Unit Tests (ohne Integration)
        working-directory: fainance-backend
        # Integrationstests brauchen ein laufendes Backend + Ollama
        # Die laufen nur lokal. In CI nur Unit Tests.
        run: pytest tests/test_parser.py -v --tb=short

  # ── Backend Integration Tests ─────────────────────────────────────────────────
  # Integrationstests laufen in CI mit einem echten Backend — aber ohne Ollama.
  # Kategorisierung fällt auf Keywords zurück, LLM-Tests werden übersprungen.
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: fainance-backend/requirements.txt

      - name: Dependencies installieren
        working-directory: fainance-backend
        run: pip install -r requirements.txt pytest httpx

      - name: Backend starten
        working-directory: fainance-backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          # Warten bis Backend bereit ist — max 15 Sekunden
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/ && break
            echo "Warte auf Backend... ($i/15)"
            sleep 1
          done

      - name: Integrationstests (ohne LLM-abhängige Tests)
        working-directory: fainance-backend
        env:
          API_BASE_URL: http://localhost:8000
        # -k "not accuracy and not ollama" überspringt Tests die Ollama brauchen
        run: |
          pytest tests/test_integration.py -v -s \
            -k "not test_category_accuracy and not test_ollama_is_reachable" \
            --tb=short

  # ── Flutter Build Check ───────────────────────────────────────────────────────
  flutter-build:
    name: Flutter Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"  # stabile Version die Dart 3.6 nutzt
          channel: "stable"
          cache: true

      - name: Dependencies installieren
        working-directory: apps/fainance_app
        run: flutter pub get

      - name: Dart Analyzer
        working-directory: apps/fainance_app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Tests
        working-directory: apps/fainance_app
        run: flutter test